name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # macOS coverage is advisory until validated on real hardware; promote to required once green
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    steps:
      - uses: actions/checkout@v5

      - name: Install tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y bats
          ver=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          # jq and shellcheck are preinstalled on ubuntu-latest runners.

      - name: Install tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install jq bats-core shellcheck gitleaks

      - name: Check
        run: ./check.sh
