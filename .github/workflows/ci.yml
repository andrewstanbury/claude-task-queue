name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
        # jq and shellcheck are preinstalled on ubuntu-latest runners.

      - name: Validate shipped JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            echo "jq check: $f"
            jq empty "$f"
          done

      - name: ShellCheck
        # SC1091: lib/tasks.sh is sourced by a computed path at runtime, so
        # shellcheck can't statically follow it — that's expected, not a defect.
        run: shellcheck -e SC1091 bin/*.sh lib/*.sh

      - name: Secret scan (gitleaks)
        run: |
          ver=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --no-git --redact

      - name: File-size guard
        # Keep source files decomposable. Bump MAX deliberately, not by reflex.
        run: |
          MAX=300
          fail=0
          for f in bin/*.sh lib/*.sh; do
            n=$(wc -l < "$f")
            if [ "$n" -gt "$MAX" ]; then
              echo "::error file=$f::$f has $n lines (> $MAX) — decompose it before growing further."
              fail=1
            fi
          done
          exit $fail

      - name: Run bats suite
        run: bats tests/
